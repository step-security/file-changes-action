name: Integration Tests
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'package.json'
      - run: yarn build-package
      - uses: ./
        id: file_changes
      - run: |
          echo "files: ${{ steps.file_changes.outputs.files }}"
          echo "files_added: ${{ steps.file_changes.outputs.files_added }}"
          echo "files_modified: ${{ steps.file_changes.outputs.files_modified }}"
          echo "files_removed: ${{ steps.file_changes.outputs.files_removed }}"
